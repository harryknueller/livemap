<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weltbosse</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="worldboss-detached-window">
  <main class="worldboss-detached-shell" id="worldBossDetachedShell">
    <div class="worldboss-overlay worldboss-overlay-detached" id="worldBossDetachedOverlay" data-visible="true">
      <div class="worldboss-overlay-list" id="worldBossDetachedList"></div>
    </div>
    <div class="worldboss-detached-resize worldboss-detached-resize-n" data-resize="n"></div>
    <div class="worldboss-detached-resize worldboss-detached-resize-e" data-resize="e"></div>
    <div class="worldboss-detached-resize worldboss-detached-resize-s" data-resize="s"></div>
    <div class="worldboss-detached-resize worldboss-detached-resize-w" data-resize="w"></div>
    <div class="worldboss-detached-resize worldboss-detached-resize-ne" data-resize="ne"></div>
    <div class="worldboss-detached-resize worldboss-detached-resize-se" data-resize="se"></div>
    <div class="worldboss-detached-resize worldboss-detached-resize-sw" data-resize="sw"></div>
    <div class="worldboss-detached-resize worldboss-detached-resize-nw" data-resize="nw"></div>
  </main>
  <script src="worldboss-window.js"></script>
</body>
</html>
